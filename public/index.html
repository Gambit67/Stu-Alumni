<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>

<body>
  <div>
    <p>Hello </p>
    <!-- This is where we will display the welcome message later -->
    <h1 id="welcome-message"></h1>
  </div>

  <section>
    <h3>Signup</h3>
    <form id="signup-form">
      <input type="email" id="signup-email" placeholder="Email" required>
      <input type="password" id="signup-password" placeholder="Password" required>
      <button type="submit">Create Account</button>
    </form>
  </section>

  <hr>

  <section>
    <h3>Login</h3>
    <form id="login-form">
      <input type="email" id="login-email" placeholder="Email" required>
      <input type="password" id="login-password" placeholder="Password" required>
      <button type="submit">Login</button>
    </form>
  </section>

  <!-- <script src="https://accounts.google.com/gsi/client" async defer></script>

  <div id="g_id_onload" data-client_id="process.env.GOOGLE_CLIENT_ID.apps.googleusercontent.com"
    data-callback="handleCredentialResponse" data-auto_prompt="false">
  </div>

  <div class="g_id_signin" data-type="standard"></div> -->

  <script>
    // Signup logic
    const signupForm = document.getElementById('signup-form');
    signupForm.addEventListener('submit', async (e) => {
      e.preventDefault(); // Stop page reload

      const email = document.getElementById('signup-email').value;
      const password = document.getElementById('signup-password').value;

      try {
        const response = await fetch('/sql/signup', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });

        const data = await response.json();
        console.log(data)
        alert(data.message); // Displays "Signup succesful" or error message
      } catch (error) {
        console.error('Error during signup:', error);
      }
    });

    // Login logic
    const loginForm = document.getElementById('login-form');
    loginForm.addEventListener('submit', async (e) => {
      e.preventDefault();

      const email = document.getElementById('login-email').value;
      const password = document.getElementById('login-password').value;

      try {
        const response = await fetch('/sql/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });

        const data = await response.json();
        
        if (response.ok) {
          // After successful login, fetch the user's name from the Users table
          const profileResponse = await fetch(`/sql/${data.id}`);
          const profileData = await profileResponse.json();
          
          const name = profileData.profile?.name || data.email;
          document.getElementById('welcome-message').textContent = `Welcome, ${name}!`;
        } else {
          alert(data.message);
        }
      } catch (error) {
        console.error('Error during login:', error);
      }
    });

    // function handleCredentialResponse(response) {
    //   // This is a JSON Web Token (JWT)
    //   const idToken = response.credential;
    //   fetch('/api/auth/google', {
    //     method: 'POST',
    //     headers: { 'Content-Type': 'application/json' },
    //     body: JSON.stringify({ token: idToken })
    //   });
    // }
  </script>


</body>

</html>
